<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Creator — MedicLog</title>
    <meta name="description" content="Customize MedicLog settings visually and generate a QR code to import them instantly.">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        .creator-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .creator-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .creator-header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .creator-header .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Screen selector tabs */
        .screen-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            border-bottom: 2px solid var(--border);
        }

        .screen-tab {
            padding: 0.75rem 1.25rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .screen-tab:hover {
            color: var(--text-primary);
        }

        .screen-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Main layout: settings left, preview right */
        .creator-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1000px) {
            .creator-layout {
                grid-template-columns: 1fr;
            }
            .preview-panel {
                order: -1;
            }
        }

        /* Settings Panel */
        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .settings-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .settings-section.hidden {
            display: none;
        }

        .settings-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-label span {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .setting-label small {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            margin-top: 0.125rem;
        }

        /* Toggle switch */
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--border);
            border-radius: 24px;
            transition: 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle input:checked + .toggle-slider {
            background: var(--accent);
        }

        .toggle input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        /* Segmented control */
        .segmented {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }

        .segmented label {
            flex: 1;
            text-align: center;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .segmented input {
            display: none;
        }

        .segmented input:checked + label {
            background: var(--accent);
            color: white;
            font-weight: 500;
        }

        /* Number input */
        input[type="number"] {
            width: 80px;
            padding: 0.4rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        /* Preview Panel */
        .preview-panel {
            position: sticky;
            top: 100px;
        }

        .preview-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .preview-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        /* Phone mockup */
        .phone-mockup {
            background: #1a1a1a;
            border-radius: 32px;
            padding: 12px;
            margin: 0 auto 1.5rem;
            max-width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .phone-screen {
            border-radius: 24px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .preview-screen {
            height: 520px;
            padding: 0;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-screen.light {
            background: #f2f2f7;
            color: #1c1c1e;
        }

        .preview-screen.dark {
            background: #1c1c1e;
            color: #f2f2f7;
        }

        /* QR output section */
        .qr-output {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .qr-pages {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .qr-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .qr-page canvas {
            border-radius: 8px;
        }

        .qr-page-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .generate-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .generate-btn:hover {
            background: var(--accent-hover);
        }

        .preview-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">
                <img src="icon.png" alt="MedicLog">
                MedicLog
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="docs.html">Docs</a>
                <a href="presets.html">Presets</a>
                <a href="settings-creator.html" class="active">Settings Creator</a>
            </div>
        </div>
    </nav>

    <div class="creator-container">
        <div class="creator-header">
            <h1>Settings Creator</h1>
            <p class="subtitle">Customize your MedicLog preferences and generate a QR code to import them</p>
        </div>

        <!-- Screen selector tabs -->
        <div class="screen-tabs">
            <button class="screen-tab active" data-screen="active-call">Active Call</button>
            <button class="screen-tab" data-screen="vitals">Vitals Entry</button>
            <button class="screen-tab" data-screen="radio">Radio Report</button>
            <button class="screen-tab" data-screen="handoff">Hospital Handoff</button>
            <button class="screen-tab" data-screen="history">History</button>
            <button class="screen-tab" data-screen="export">Share/Export</button>
            <button class="screen-tab" data-screen="global">Global</button>
        </div>

        <div class="creator-layout">
            <!-- Settings Panel (left) -->
            <div class="settings-panel" id="settings-panel">
                <!-- Settings sections will be dynamically filtered based on selected screen -->
            </div>

            <!-- Preview Panel (right) -->
            <div class="preview-panel">
                <div class="preview-card">
                    <h3>Live Preview</h3>
                    <div class="phone-mockup">
                        <div class="phone-screen">
                            <div class="preview-screen light" id="preview">
                                <div class="preview-placeholder">
                                    Preview shows selected screen
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="qr-output">
                        <button class="generate-btn" onclick="generateQR()">Generate QR Code</button>
                        <div class="qr-pages" id="qr-pages"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== SETTINGS REGISTRY ==========
        // Single source of truth for all settings

        const SettingsRegistry = {
            // Key: setting key, Value: metadata
            settings: {
                // Agency
                'agencyName': { type: 'text', default: '', screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'name'] },
                'useIncidentNumbers': { type: 'toggle', default: true, screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'useIncidentNumbers'] },
                'showPHIWarnings': { type: 'toggle', default: true, screens: ['handoff', 'export', 'global'], section: 'PHI Warnings', qrPath: ['agency', 'showPHIWarnings'] },
                'showTestDataTools': { type: 'toggle', default: true, screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'showTestDataTools'] },
                'cardiac.showVectorChange': { type: 'toggle', default: true, screens: ['active-call'], section: 'Cardiac Procedures', qrPath: ['agency', 'cardiac.showVectorChange'] },
                'cardiac.showDualSequential': { type: 'toggle', default: true, screens: ['active-call'], section: 'Cardiac Procedures', qrPath: ['agency', 'cardiac.showDualSequential'] },
                'endOfCallAction': { type: 'select', default: 'promptHandoff', options: [
                    {value: 'promptHandoff', label: 'Prompt for Handoff'},
                    {value: 'saveSilently', label: 'Save Silently'},
                    {value: 'showExport', label: 'Show Export'}
                ], screens: ['handoff'], section: 'End of Call Action', qrPath: ['agency', 'endOfCallAction'] },
                'hospitalHandoff.showInShareMenu': { type: 'toggle', default: true, screens: ['handoff'], section: 'Hospital Handoff', qrPath: ['agency', 'hospitalHandoff.showInShareMenu'] },
                'hospitalHandoff.showAtEndCall': { type: 'toggle', default: true, screens: ['handoff'], section: 'Hospital Handoff', qrPath: ['agency', 'hospitalHandoff.showAtEndCall'] },
                'strokeScale': { type: 'select', default: 'cincinnati', options: [
                    {value: 'cincinnati', label: 'Cincinnati'},
                    {value: 'lams', label: 'LAMS'},
                    {value: 'race', label: 'RACE'},
                    {value: 'fasted', label: 'FAST-ED'},
                    {value: 'nihss', label: 'NIHSS'}
                ], screens: ['vitals'], section: 'Stroke Scale', qrPath: ['agency', 'strokeScale'] },

                // Display
                'appearanceMode': { type: 'select', default: 0, options: [
                    {value: 0, label: 'System'},
                    {value: 1, label: 'Light'},
                    {value: 2, label: 'Dark'}
                ], screens: ['global'], section: 'Appearance', qrPath: ['display', 'appearanceMode'] },
                'use24HourTime': { type: 'toggle', default: true, screens: ['radio', 'history', 'global'], section: 'Time & Date Format', qrPath: ['display', 'use24HourTime'] },
                'useUTCTime': { type: 'toggle', default: false, screens: ['radio', 'history', 'global'], section: 'Time & Date Format', qrPath: ['display', 'useUTCTime'] },
                'useMilitaryDate': { type: 'toggle', default: false, screens: ['radio', 'history', 'global'], section: 'Time & Date Format', qrPath: ['display', 'useMilitaryDate'] },
                'groupActiveCallEntries': { type: 'toggle', default: false, screens: ['active-call'], section: 'Timeline Display', qrPath: ['display', 'groupActiveCallEntries'] },
                'groupHistoryEntries': { type: 'toggle', default: false, screens: ['history'], section: 'History Display', qrPath: ['display', 'groupHistoryEntries'] },
                'groupMedicationsByType': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timeline Display', qrPath: ['display', 'groupMedicationsByType'] },
                'keepScreenAwake': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'keepScreenAwake'] },
                'showCallTimer': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'showCallTimer'] },
                'showMedicationTimers': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'showMedicationTimers'] },
                'showPatientInfoButton': { type: 'toggle', default: false, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'showPatientInfoButton'] },

                // Quick Entry
                'quickEntry.vitals': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'vitals'] },
                'quickEntry.medication': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'medication'] },
                'quickEntry.cardiac': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'cardiac'] },
                'quickEntry.iv': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'iv'] },
                'quickEntry.procedure': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'procedure'] },
                'quickEntry.note': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'note'] },
                'quickEntry.photo': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'photo'] },
                'quickEntry.trauma': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'trauma'] },
                'quickEntry.transfer': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'transfer'] },
                'quickEntry.address': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'address'] },
                'defaultIVGauge': { type: 'select', default: '18g', options: [
                    {value: '14g', label: '14ga'},
                    {value: '16g', label: '16ga'},
                    {value: '18g', label: '18ga'},
                    {value: '20g', label: '20ga'},
                    {value: '22g', label: '22ga'},
                    {value: '24g', label: '24ga'}
                ], screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'defaultIVGauge'] },

                // Watch
                'showWatchConnectivity': { type: 'toggle', default: true, screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'showWatchConnectivity'] },
                'watchVoiceMode': { type: 'select', default: 'auto', options: [
                    {value: 'auto', label: 'Auto'},
                    {value: 'manual', label: 'Manual'},
                    {value: 'alwaysListening', label: 'Always Listening'}
                ], screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'watchVoiceMode'] },

                // Vitals
                'showVitalsButton': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry', qrPath: ['vitals', 'showVitalsButton'] },
                'radioShowFullVitals': { type: 'toggle', default: true, screens: ['radio'], section: 'Radio Report', qrPath: ['vitals', 'radioShowFullVitals'] },
                'radioMaxInterventions': { type: 'number', default: 5, min: 1, max: 20, screens: ['radio'], section: 'Radio Report', qrPath: ['vitals', 'radioMaxInterventions'] },
                'vitalsReminderEnabled': { type: 'toggle', default: false, screens: ['vitals'], section: 'Vitals Reminder', qrPath: ['vitals', 'reminderEnabled'] },
                'vitalsReminderInterval': { type: 'select', default: 300, options: [
                    {value: 300, label: '5 minutes'},
                    {value: 600, label: '10 minutes'},
                    {value: 900, label: '15 minutes'},
                    {value: 1800, label: '30 minutes'}
                ], screens: ['vitals'], section: 'Vitals Reminder', qrPath: ['vitals', 'reminderInterval'] },
                'vitalsShowMathHelper': { type: 'toggle', default: true, screens: ['vitals'], section: 'Math Helpers', qrPath: ['vitals', 'showMathHelper'] },

                // Vitals Field Visibility (10 fields)
                'vitalsShowBP': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowBP'] },
                'vitalsShowHR': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowHR'] },
                'vitalsShowSpO2': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowSpO2'] },
                'vitalsShowRR': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowRR'] },
                'vitalsShowTemp': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowTemp'] },
                'vitalsShowETCO2': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowETCO2'] },
                'vitalsShowGlucose': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowGlucose'] },
                'vitalsShowPain': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowPain'] },
                'vitalsShowGCS': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowGCS'] },
                'vitalsShowStrokeScreen': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry Fields', qrPath: ['vitals', 'fieldVisibility', 'vitalsShowStrokeScreen'] },

                // Vitals Collapsed Display (9 fields - no StrokeScreen here, that's a separate display.vitalsCollapsed object in QR)
                'vitalsCollapsed.showBP': { type: 'toggle', default: true, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showBP'] },
                'vitalsCollapsed.showHR': { type: 'toggle', default: true, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showHR'] },
                'vitalsCollapsed.showRR': { type: 'toggle', default: true, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showRR'] },
                'vitalsCollapsed.showSpO2': { type: 'toggle', default: false, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showSpO2'] },
                'vitalsCollapsed.showTemp': { type: 'toggle', default: false, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showTemp'] },
                'vitalsCollapsed.showETCO2': { type: 'toggle', default: false, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showETCO2'] },
                'vitalsCollapsed.showGlucose': { type: 'toggle', default: false, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showGlucose'] },
                'vitalsCollapsed.showPain': { type: 'toggle', default: false, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showPain'] },
                'vitalsCollapsed.showGCS': { type: 'toggle', default: false, screens: ['active-call'], section: 'Vitals Collapsed Display', qrPath: ['display', 'vitalsCollapsed', 'showGCS'] },

                // Export
                'exportFormat.pdf': { type: 'toggle', default: true, screens: ['handoff', 'export'], section: 'Export Settings', qrPath: ['export', 'pdf'] },
                'exportFormat.text': { type: 'toggle', default: false, screens: ['handoff', 'export'], section: 'Export Settings', qrPath: ['export', 'text'] },
                'exportFormat.csv': { type: 'toggle', default: false, screens: ['handoff', 'export'], section: 'Export Settings', qrPath: ['export', 'csv'] }
            }
        };

        // ========== SETTINGS STATE ==========
        // Current values of all settings

        const SettingsState = {
            values: {},

            init() {
                // Initialize with defaults
                for (const [key, meta] of Object.entries(SettingsRegistry.settings)) {
                    this.values[key] = meta.default;
                }
            },

            get(key) {
                return this.values[key];
            },

            set(key, value) {
                this.values[key] = value;
                this.onChange(key, value);
            },

            onChange(key, value) {
                // Update preview when settings change
                PreviewRenderer.update();
            }
        };

        // ========== SCREEN FILTER ==========
        // Shows/hides settings based on selected screen

        const ScreenFilter = {
            currentScreen: 'active-call',

            init() {
                // Set up tab listeners
                document.querySelectorAll('.screen-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        this.setScreen(tab.dataset.screen);
                    });
                });
            },

            setScreen(screen) {
                this.currentScreen = screen;

                // Update active tab
                document.querySelectorAll('.screen-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.screen === screen);
                });

                // Filter settings sections
                this.filterSettings();

                // Update preview
                PreviewRenderer.update();
            },

            filterSettings() {
                const panel = document.getElementById('settings-panel');
                panel.innerHTML = '';

                // Group settings by section for current screen
                const sections = {};
                for (const [key, meta] of Object.entries(SettingsRegistry.settings)) {
                    if (meta.screens.includes(this.currentScreen) || meta.screens.includes('global')) {
                        if (!sections[meta.section]) {
                            sections[meta.section] = [];
                        }
                        sections[meta.section].push({ key, meta });
                    }
                }

                // Render sections
                for (const [sectionName, settings] of Object.entries(sections)) {
                    const section = document.createElement('div');
                    section.className = 'settings-section';
                    section.innerHTML = `<h3>${sectionName}</h3>`;

                    settings.forEach(({ key, meta }) => {
                        const row = this.createSettingRow(key, meta);
                        section.appendChild(row);
                    });

                    panel.appendChild(section);
                }
            },

            createSettingRow(key, meta) {
                const row = document.createElement('div');
                row.className = 'setting-row';

                const label = document.createElement('div');
                label.className = 'setting-label';
                label.innerHTML = `<span>${this.getLabelText(key)}</span>`;

                const control = this.createControl(key, meta);

                row.appendChild(label);
                row.appendChild(control);
                return row;
            },

            getLabelText(key) {
                // Convert key to human-readable label
                const labels = {
                    'agencyName': 'Agency Name',
                    'useIncidentNumbers': 'Use Incident Numbers',
                    'showPHIWarnings': 'Show PHI Warnings',
                    'showTestDataTools': 'Show Test Data Tools',
                    'cardiac.showVectorChange': 'Vector Change',
                    'cardiac.showDualSequential': 'Dual Sequential',
                    'endOfCallAction': 'End of Call Action',
                    'hospitalHandoff.showInShareMenu': 'Show in Share Menu',
                    'hospitalHandoff.showAtEndCall': 'Show at End Call',
                    'strokeScale': 'Stroke Scale',
                    'appearanceMode': 'Theme',
                    'use24HourTime': '24-Hour Time',
                    'useUTCTime': 'UTC Time',
                    'useMilitaryDate': 'Military Date',
                    'groupActiveCallEntries': 'Group Timeline Entries',
                    'groupHistoryEntries': 'Group History Entries',
                    'groupMedicationsByType': 'Group Medications by Type',
                    'keepScreenAwake': 'Keep Screen Awake',
                    'showCallTimer': 'Call Timer',
                    'showMedicationTimers': 'Medication Timers',
                    'showPatientInfoButton': 'Patient Info Button',
                    'quickEntry.vitals': 'Vitals',
                    'quickEntry.medication': 'Medication',
                    'quickEntry.cardiac': 'Cardiac',
                    'quickEntry.iv': 'IV',
                    'quickEntry.procedure': 'Procedure',
                    'quickEntry.note': 'Note',
                    'quickEntry.photo': 'Photo',
                    'quickEntry.trauma': 'Trauma',
                    'quickEntry.transfer': 'Transfer',
                    'quickEntry.address': 'Address',
                    'defaultIVGauge': 'Default IV Gauge',
                    'showWatchConnectivity': 'Watch Connectivity',
                    'watchVoiceMode': 'Watch Voice Mode',
                    'showVitalsButton': 'Show Vitals Button',
                    'radioShowFullVitals': 'Show Full Vitals',
                    'radioMaxInterventions': 'Max Interventions',
                    'vitalsReminderEnabled': 'Enable Reminder',
                    'vitalsReminderInterval': 'Reminder Interval',
                    'vitalsShowMathHelper': 'Math Helper',
                    'vitalsShowBP': 'Blood Pressure',
                    'vitalsShowHR': 'Heart Rate',
                    'vitalsShowSpO2': 'SpO₂',
                    'vitalsShowRR': 'Respiratory Rate',
                    'vitalsShowTemp': 'Temperature',
                    'vitalsShowETCO2': 'ETCO₂',
                    'vitalsShowGlucose': 'Glucose',
                    'vitalsShowPain': 'Pain',
                    'vitalsShowGCS': 'GCS',
                    'vitalsShowStrokeScreen': 'Stroke Screen',
                    'vitalsCollapsed.showBP': 'BP',
                    'vitalsCollapsed.showHR': 'HR',
                    'vitalsCollapsed.showRR': 'RR',
                    'vitalsCollapsed.showSpO2': 'SpO₂',
                    'vitalsCollapsed.showTemp': 'Temp',
                    'vitalsCollapsed.showETCO2': 'ETCO₂',
                    'vitalsCollapsed.showGlucose': 'Glucose',
                    'vitalsCollapsed.showPain': 'Pain',
                    'vitalsCollapsed.showGCS': 'GCS',
                    'exportFormat.pdf': 'PDF',
                    'exportFormat.text': 'Text',
                    'exportFormat.csv': 'CSV'
                };
                return labels[key] || key;
            },

            createControl(key, meta) {
                const value = SettingsState.get(key);

                if (meta.type === 'toggle') {
                    const toggle = document.createElement('label');
                    toggle.className = 'toggle';
                    toggle.innerHTML = `
                        <input type="checkbox" ${value ? 'checked' : ''}
                               onchange="SettingsState.set('${key}', this.checked)">
                        <span class="toggle-slider"></span>
                    `;
                    return toggle;
                }

                if (meta.type === 'select') {
                    const segmented = document.createElement('div');
                    segmented.className = 'segmented';
                    meta.options.forEach(opt => {
                        const input = document.createElement('input');
                        input.type = 'radio';
                        input.name = key;
                        input.id = `${key}-${opt.value}`;
                        input.checked = value === opt.value;
                        input.onchange = () => SettingsState.set(key, opt.value);

                        const label = document.createElement('label');
                        label.htmlFor = `${key}-${opt.value}`;
                        label.textContent = opt.label;

                        segmented.appendChild(input);
                        segmented.appendChild(label);
                    });
                    return segmented;
                }

                if (meta.type === 'number') {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.value = value;
                    input.min = meta.min || 0;
                    input.max = meta.max || 999;
                    input.onchange = () => SettingsState.set(key, parseInt(input.value));
                    return input;
                }

                if (meta.type === 'text') {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = value;
                    input.style.width = '200px';
                    input.style.padding = '0.4rem 0.5rem';
                    input.style.border = '1px solid var(--border)';
                    input.style.borderRadius = '6px';
                    input.style.background = 'var(--bg-tertiary)';
                    input.style.color = 'var(--text-primary)';
                    input.onchange = () => SettingsState.set(key, input.value);
                    return input;
                }

                return document.createElement('span');
            }
        };

        // ========== PREVIEW RENDERER ==========
        // Updates the phone preview based on settings

        const PreviewRenderer = {
            update() {
                const preview = document.getElementById('preview');
                const screen = ScreenFilter.currentScreen;
                const theme = SettingsState.get('appearanceMode');

                // Update theme
                preview.className = `preview-screen ${theme === 1 ? 'light' : theme === 2 ? 'dark' : 'light'}`;

                // Show placeholder for now (simplified version)
                preview.innerHTML = `
                    <div class="preview-placeholder">
                        Preview for ${screen} screen<br>
                        Theme: ${theme === 0 ? 'System' : theme === 1 ? 'Light' : 'Dark'}
                    </div>
                `;
            }
        };

        // ========== QR GENERATOR ==========
        // Generates QuickConfigManager-compatible QR codes

        function generateQR() {
            const payload = buildPayload();
            const pages = splitPayload(payload);

            const container = document.getElementById('qr-pages');
            container.innerHTML = '';

            pages.forEach((page, index) => {
                const json = JSON.stringify(page);
                const pageDiv = document.createElement('div');
                pageDiv.className = 'qr-page';

                const canvas = document.createElement('canvas');
                pageDiv.appendChild(canvas);

                if (pages.length > 1) {
                    const label = document.createElement('div');
                    label.className = 'qr-page-label';
                    label.textContent = `Page ${index + 1} of ${pages.length}`;
                    pageDiv.appendChild(label);
                }

                container.appendChild(pageDiv);

                QRCode.toCanvas(canvas, json, {
                    width: 200,
                    errorCorrectionLevel: 'M'
                }, (err) => {
                    if (err) console.error('QR generation failed:', err);
                });
            });
        }

        function buildPayload() {
            const payload = {
                type: 'quick_config',
                configVersion: 1,
                exportedAt: new Date().toISOString()
            };

            // Build nested structure using qrPath from registry
            for (const [key, meta] of Object.entries(SettingsRegistry.settings)) {
                const value = SettingsState.get(key);
                if (value === meta.default) continue; // Skip defaults

                const path = meta.qrPath;
                let current = payload;
                for (let i = 0; i < path.length - 1; i++) {
                    if (!current[path[i]]) current[path[i]] = {};
                    current = current[path[i]];
                }
                current[path[path.length - 1]] = value;
            }

            return payload;
        }

        function splitPayload(payload) {
            // Try single page first
            payload.page = 1;
            payload.totalPages = 1;

            const json = JSON.stringify(payload);
            const sizeBytes = new Blob([json]).size;

            // Error correction level M allows ~5,596 bytes
            if (sizeBytes <= 5596) {
                return [payload];
            }

            // Too large - split into 2 pages
            const page1 = { ...payload };
            delete page1.timers;
            page1.totalPages = 2;

            const page2 = {
                type: 'quick_config',
                configVersion: 1,
                page: 2,
                totalPages: 2,
                timers: payload.timers || []
            };

            return [page1, page2];
        }

        // ========== INITIALIZATION ==========
        SettingsState.init();
        ScreenFilter.init();
        ScreenFilter.filterSettings();
        PreviewRenderer.update();
    </script>
</body>
