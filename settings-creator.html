<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Creator — MedicLog</title>
    <meta name="description" content="Customize MedicLog settings visually and generate a QR code to import them instantly.">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        .creator-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .creator-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .creator-header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .creator-header .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Screen selector tabs */
        .screen-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            border-bottom: 2px solid var(--border);
        }

        .screen-tab {
            padding: 0.75rem 1.25rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .screen-tab:hover {
            color: var(--text-primary);
        }

        .screen-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Main layout: settings left, preview right */
        .creator-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1000px) {
            .creator-layout {
                grid-template-columns: 1fr;
            }
            .preview-panel {
                order: -1;
            }
        }

        /* Settings Panel */
        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .settings-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .settings-section.hidden {
            display: none;
        }

        .settings-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-label span {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .setting-label small {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            margin-top: 0.125rem;
        }

        /* Toggle switch */
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--border);
            border-radius: 24px;
            transition: 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle input:checked + .toggle-slider {
            background: var(--accent);
        }

        .toggle input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        /* Segmented control */
        .segmented {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 3px;
            gap: 2px;
        }

        .segmented label {
            flex: 1;
            text-align: center;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .segmented input {
            display: none;
        }

        .segmented input:checked + label {
            background: var(--accent);
            color: white;
            font-weight: 500;
        }

        /* Number input */
        input[type="number"], input[type="text"] {
            width: 80px;
            padding: 0.4rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        /* Timer editor styles */
        .timer-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .timer-entry {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .timer-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .timer-entry-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .timer-entry-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .timer-entry-controls label {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .timer-entry-controls input {
            width: 100%;
        }

        .add-timer-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-timer-btn:hover {
            opacity: 0.9;
        }

        .remove-timer-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* Field order styles */
        .field-order-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .field-order-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            cursor: move;
        }

        .field-order-item:hover {
            background: var(--border);
        }

        .field-order-drag {
            color: var(--text-muted);
            cursor: grab;
        }

        .field-order-drag:active {
            cursor: grabbing;
        }

        .field-order-name {
            flex: 1;
            font-size: 0.9rem;
        }

        .field-order-arrows {
            display: flex;
            gap: 0.25rem;
        }

        .field-order-arrows button {
            background: var(--border);
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .field-order-arrows button:hover {
            background: var(--accent);
            color: white;
        }

        .field-order-arrows button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Preview Panel */
        .preview-panel {
            position: sticky;
            top: 100px;
        }

        .preview-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .preview-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        /* Phone mockup */
        .phone-mockup {
            background: #1a1a1a;
            border-radius: 32px;
            padding: 12px;
            margin: 0 auto 1.5rem;
            max-width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .phone-screen {
            border-radius: 24px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .preview-screen {
            height: 520px;
            padding: 0;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-screen.light {
            background: #f2f2f7;
            color: #1c1c1e;
        }

        .preview-screen.dark {
            background: #1c1c1e;
            color: #f2f2f7;
        }

        /* Preview content styles */
        .preview-header {
            background: #007AFF;
            color: white;
            padding: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
        }

        .preview-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            font-size: 0.8rem;
        }

        .preview-timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .preview-timer {
            background: rgba(0, 122, 255, 0.15);
            border: 1px solid rgba(0, 122, 255, 0.3);
            border-radius: 8px;
            padding: 0.5rem;
            text-align: center;
        }

        .preview-button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            margin: 0.25rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .preview-entry {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
        }

        .preview-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* QR output section */
        .qr-output {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .qr-pages {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .qr-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .qr-page canvas {
            border-radius: 8px;
        }

        .qr-page-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .generate-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .generate-btn:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav" data-page="agency"></nav>

    <div class="creator-container">
        <div class="creator-header">
            <h1>Settings Creator</h1>
            <p class="subtitle">Customize your MedicLog preferences and generate a QR code to import them</p>
        </div>

        <!-- Screen selector tabs -->
        <div class="screen-tabs">
            <button class="screen-tab active" data-screen="active-call">Active Call</button>
            <button class="screen-tab" data-screen="vitals">Vitals Entry</button>
            <button class="screen-tab" data-screen="radio">Radio Report</button>
            <button class="screen-tab" data-screen="handoff">Hospital Handoff</button>
            <button class="screen-tab" data-screen="history">History</button>
            <button class="screen-tab" data-screen="export">Share/Export</button>
            <button class="screen-tab" data-screen="global">Global</button>
        </div>

        <div class="creator-layout">
            <!-- Settings Panel (left) -->
            <div class="settings-panel" id="settings-panel">
                <!-- Settings sections will be dynamically filtered based on selected screen -->
            </div>

            <!-- Preview Panel (right) -->
            <div class="preview-panel">
                <div class="preview-card">
                    <h3>Live Preview</h3>
                    <div class="phone-mockup">
                        <div class="phone-screen">
                            <div class="preview-screen light" id="preview">
                                <div class="preview-placeholder">
                                    Preview shows selected screen
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="qr-output">
                        <button class="generate-btn" onclick="generateQR()">Generate QR Code</button>
                        <div class="qr-pages" id="qr-pages"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== MEDICATION TIMERS STATE ==========
        // Per-medication timer configurations
        const MedicationTimers = {
            timers: [],

            init() {
                // Start with a couple examples
                this.timers = [
                    { name: 'Fentanyl', timerEnabled: true, timerDuration: 300, timerLabel: 'Fentanyl Redose', timerColor: '#FF00FF' },
                    { name: 'Morphine', timerEnabled: false, timerDuration: 600, timerLabel: 'Morphine Redose', timerColor: '#FF69B4' }
                ];
            },

            add(name = 'New Medication') {
                this.timers.push({
                    name: name,
                    timerEnabled: true,
                    timerDuration: 300,
                    timerLabel: `${name} Redose`,
                    timerColor: '#007AFF'
                });
                SettingsState.onChange('timers', this.timers);
            },

            remove(index) {
                this.timers.splice(index, 1);
                SettingsState.onChange('timers', this.timers);
            },

            update(index, field, value) {
                if (this.timers[index]) {
                    this.timers[index][field] = value;
                    SettingsState.onChange('timers', this.timers);
                }
            },

            getAll() {
                return this.timers;
            }
        };

        // ========== VITALS FIELD ORDER STATE ==========
        // Order of vital fields in vitals entry form
        const VitalsFieldOrder = {
            order: ['BP', 'HR', 'SpO2', 'RR', 'Temp', 'ETCO2', 'Glucose', 'Pain', 'GCS', 'StrokeScreen'],

            moveUp(index) {
                if (index > 0) {
                    [this.order[index], this.order[index - 1]] = [this.order[index - 1], this.order[index]];
                    SettingsState.onChange('fieldOrder', this.order);
                }
            },

            moveDown(index) {
                if (index < this.order.length - 1) {
                    [this.order[index], this.order[index + 1]] = [this.order[index + 1], this.order[index]];
                    SettingsState.onChange('fieldOrder', this.order);
                }
            },

            getAll() {
                return this.order;
            }
        };

        // ========== SETTINGS REGISTRY ==========
        // Single source of truth for all settings

        const SettingsRegistry = {
            // Key: setting key, Value: metadata
            settings: {
                // Agency
                'agencyName': { type: 'text', default: '', screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'name'] },
                'useIncidentNumbers': { type: 'toggle', default: true, screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'useIncidentNumbers'] },
                'showPHIWarnings': { type: 'toggle', default: true, screens: ['handoff', 'export', 'global'], section: 'PHI Warnings', qrPath: ['agency', 'showPHIWarnings'] },
                'showTestDataTools': { type: 'toggle', default: true, screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'showTestDataTools'] },
                'cardiac.showVectorChange': { type: 'toggle', default: true, screens: ['active-call'], section: 'Cardiac Procedures', qrPath: ['agency', 'cardiac.showVectorChange'] },
                'cardiac.showDualSequential': { type: 'toggle', default: true, screens: ['active-call'], section: 'Cardiac Procedures', qrPath: ['agency', 'cardiac.showDualSequential'] },
                'endOfCallAction': { type: 'select', default: 'hospital', options: [
                    {value: 'hospital', label: 'Hospital Handoff'},
                    {value: 'mist', label: 'MIST Radio Report'},
                    {value: 'none', label: 'None'}
                ], screens: ['handoff'], section: 'End of Call Action', qrPath: ['agency', 'endOfCallAction'] },
                'hospitalHandoff.showInShareMenu': { type: 'toggle', default: true, screens: ['handoff'], section: 'Hospital Handoff', qrPath: ['agency', 'hospitalHandoff.showInShareMenu'] },
                'hospitalHandoff.showAtEndCall': { type: 'toggle', default: true, screens: ['handoff'], section: 'Hospital Handoff', qrPath: ['agency', 'hospitalHandoff.showAtEndCall'] },
                'strokeScale': { type: 'select', default: 'cincinnati', options: [
                    {value: 'cincinnati', label: 'Cincinnati (CPSS)'},
                    {value: 'lams', label: 'LAMS'},
                    {value: 'race', label: 'RACE'},
                    {value: 'fasted', label: 'FAST-ED'},
                    {value: 'none', label: 'Generic Score'}
                ], screens: ['vitals'], section: 'Stroke Scale', qrPath: ['agency', 'strokeScale'] },

                // Agency — features and clinical thresholds (T143 gap settings)
                'agency.destinationsEnabled': { type: 'toggle', default: true, screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'destinationsEnabled'] },
                'agency.preferredMapsApp': { type: 'select', default: 'apple', options: [
                    {value: 'apple', label: 'Apple Maps'},
                    {value: 'google', label: 'Google Maps'},
                    {value: 'waze', label: 'Waze'}
                ], screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'preferredMapsApp'] },
                'agency.showDemographicsReminder': { type: 'toggle', default: true, screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'showDemographicsReminder'] },
                'incidentNumberFormat': { type: 'text', default: '', screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'incidentNumberFormat'] },
                'backgroundCrashLogging.enabled': { type: 'toggle', default: false, screens: ['global'], section: 'Agency Configuration', qrPath: ['agency', 'backgroundCrashLogging.enabled'] },
                // LVO alert thresholds — only relevant when stroke scale is lams/fasted/race
                'agency.lvoThreshold.lams': { type: 'number', default: 4, min: 1, max: 5, screens: ['vitals'], section: 'LVO Alert Thresholds', qrPath: ['agency', 'lvoThreshold.lams'] },
                'agency.lvoThreshold.fasted': { type: 'number', default: 1, min: 1, max: 9, screens: ['vitals'], section: 'LVO Alert Thresholds', qrPath: ['agency', 'lvoThreshold.fasted'] },
                'agency.lvoThreshold.race': { type: 'number', default: 5, min: 1, max: 9, screens: ['vitals'], section: 'LVO Alert Thresholds', qrPath: ['agency', 'lvoThreshold.race'] },

                // Display
                'appearanceMode': { type: 'select', default: 0, options: [
                    {value: 0, label: 'System'},
                    {value: 1, label: 'Light'},
                    {value: 2, label: 'Dark'}
                ], screens: ['global'], section: 'Appearance', qrPath: ['display', 'appearanceMode'] },
                'use24HourTime': { type: 'toggle', default: true, screens: ['radio', 'history', 'global'], section: 'Time & Date Format', qrPath: ['display', 'use24HourTime'] },
                'useUTCTime': { type: 'toggle', default: false, screens: ['radio', 'history', 'global'], section: 'Time & Date Format', qrPath: ['display', 'useUTCTime'] },
                'useMilitaryDate': { type: 'toggle', default: false, screens: ['radio', 'history', 'global'], section: 'Time & Date Format', qrPath: ['display', 'useMilitaryDate'] },
                'groupActiveCallEntries': { type: 'toggle', default: false, screens: ['active-call'], section: 'Timeline Display', qrPath: ['display', 'groupActiveCallEntries'] },
                'groupHistoryEntries': { type: 'toggle', default: false, screens: ['history'], section: 'History Display', qrPath: ['display', 'groupHistoryEntries'] },
                'groupMedicationsByType': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timeline Display', qrPath: ['display', 'groupMedicationsByType'] },
                'keepScreenAwake': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'keepScreenAwake'] },
                'showCallTimer': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'showCallTimer'] },
                'showMedicationTimers': { type: 'toggle', default: true, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'showMedicationTimers'] },
                'showPatientInfoButton': { type: 'toggle', default: false, screens: ['active-call'], section: 'Timer & Screen', qrPath: ['display', 'showPatientInfoButton'] },

                // Quick Entry
                'quickEntry.vitals': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'vitals'] },
                'quickEntry.medication': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'medication'] },
                'quickEntry.cardiac': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'cardiac'] },
                'quickEntry.iv': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'iv'] },
                'quickEntry.procedure': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'procedure'] },
                'quickEntry.note': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'note'] },
                'quickEntry.photo': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'photo'] },
                'quickEntry.trauma': { type: 'toggle', default: true, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'trauma'] },
                'quickEntry.transfer': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'transfer'] },
                'quickEntry.address': { type: 'toggle', default: false, screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'address'] },
                'defaultIVGauge': { type: 'select', default: '18g', options: [
                    {value: '14g', label: '14ga'},
                    {value: '16g', label: '16ga'},
                    {value: '18g', label: '18ga'},
                    {value: '20g', label: '20ga'},
                    {value: '22g', label: '22ga'},
                    {value: '24g', label: '24ga'}
                ], screens: ['active-call'], section: 'Quick Entry Buttons', qrPath: ['quickEntry', 'defaultIVGauge'] },

                // Watch
                'showWatchConnectivity': { type: 'toggle', default: true, screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'showWatchConnectivity'] },
                'watchVoiceMode': { type: 'select', default: 'auto', options: [
                    {value: 'auto', label: 'Auto'},
                    {value: 'manual', label: 'Manual'},
                    {value: 'alwaysListening', label: 'Always Listening'}
                ], screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'watchVoiceMode'] },
                // T143 gap settings
                'watchEnabled': { type: 'toggle', default: false, screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'watchEnabled'] },
                'watchHapticIntensity': { type: 'select', default: 'Normal', options: [
                    {value: 'Subtle', label: 'Subtle'},
                    {value: 'Normal', label: 'Normal'},
                    {value: 'Strong', label: 'Strong'}
                ], screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'watchHapticIntensity'] },
                'watchShakeAction': { type: 'select', default: 'snooze', options: [
                    {value: 'snooze', label: 'Snooze Timer (1 min)'},
                    {value: 'ignore', label: 'Ignore'}
                ], screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'watchShakeAction'] },
                'timerPageDwellSeconds': { type: 'number', default: 5, min: 0, max: 30, screens: ['global'], section: 'Watch Configuration', qrPath: ['watch', 'timerPageDwellSeconds'] },

                // Vitals
                'showVitalsButton': { type: 'toggle', default: true, screens: ['vitals'], section: 'Vitals Entry', qrPath: ['vitals', 'showVitalsButton'] },
                'radioShowFullVitals': { type: 'toggle', default: true, screens: ['radio'], section: 'Radio Report', qrPath: ['vitals', 'radioShowFullVitals'] },

        // ========== SETTINGS STATE ==========
        // Current values of all settings

        const SettingsState = {
            values: {},

            init() {
                // Initialize with defaults
                for (const [key, meta] of Object.entries(SettingsRegistry.settings)) {
                    this.values[key] = meta.default;
                }
            },

            get(key) {
                return this.values[key];
            },

            set(key, value) {
                this.values[key] = value;
                this.onChange(key, value);
            },

            onChange(key, value) {
                // Update preview when settings change
                PreviewRenderer.update();
            }
        };

        // ========== SCREEN FILTER ==========
        // Shows/hides settings based on selected screen

        const ScreenFilter = {
            currentScreen: 'active-call',

            init() {
                // Set up tab listeners
                document.querySelectorAll('.screen-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        this.setScreen(tab.dataset.screen);
                    });
                });
            },

            setScreen(screen) {
                this.currentScreen = screen;

                // Update active tab
                document.querySelectorAll('.screen-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.screen === screen);
                });

                // Filter settings sections
                this.filterSettings();

                // Update preview
                PreviewRenderer.update();
            },

            filterSettings() {
                const panel = document.getElementById('settings-panel');
                panel.innerHTML = '';

                // Group settings by section for current screen
                const sections = {};
                for (const [key, meta] of Object.entries(SettingsRegistry.settings)) {
                    if (meta.screens.includes(this.currentScreen) || meta.screens.includes('global')) {
                        if (!sections[meta.section]) {
                            sections[meta.section] = [];
                        }
                        sections[meta.section].push({ key, meta });
                    }
                }

                // Add medication timer configuration section for active-call screen
                if (this.currentScreen === 'active-call') {
                    const timerSection = document.createElement('div');
                    timerSection.className = 'settings-section';
                    timerSection.innerHTML = '<h3>Medication Timer Configuration</h3>';
                    timerSection.appendChild(this.createTimerEditor());
                    panel.appendChild(timerSection);
                }

                // Add vitals field order section for vitals screen
                if (this.currentScreen === 'vitals') {
                    const orderSection = document.createElement('div');
                    orderSection.className = 'settings-section';
                    orderSection.innerHTML = '<h3>Vitals Field Order</h3>';
                    orderSection.appendChild(this.createFieldOrderEditor());
                    panel.appendChild(orderSection);
                }

                // Render sections
                for (const [sectionName, settings] of Object.entries(sections)) {
                    const section = document.createElement('div');
                    section.className = 'settings-section';
                    section.innerHTML = `<h3>${sectionName}</h3>`;

                    settings.forEach(({ key, meta }) => {
                        const row = this.createSettingRow(key, meta);
                        section.appendChild(row);
                    });

                    panel.appendChild(section);
                }
            },

                        <input type="checkbox" ${value ? 'checked' : ''}
                               onchange="SettingsState.set('${key}', this.checked)">
                        <span class="toggle-slider"></span>
                    `;
                    return toggle;

                if (meta.type === 'select') {
                    const segmented = document.createElement('div');
                    segmented.className = 'segmented';
                    meta.options.forEach(opt => {
                        const input = document.createElement('input');
                        input.type = 'radio';
                        input.name = key;
                        input.id = `${key}-${opt.value}`;
                        input.checked = value === opt.value;
                        input.onchange = () => SettingsState.set(key, opt.value);

                        const label = document.createElement('label');
                        label.htmlFor = `${key}-${opt.value}`;
                        label.textContent = opt.label;

                        segmented.appendChild(input);
                        segmented.appendChild(label);
                    });
                    return segmented;

                if (meta.type === 'number') {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.value = value;
                    input.min = meta.min || 0;
                    input.max = meta.max || 999;
                    input.onchange = () => SettingsState.set(key, parseInt(input.value));

        // ========== QR GENERATOR ==========
        // Generates QuickConfigManager-compatible QR codes

        function generateQR() {
            const payload = buildPayload();
            const pages = splitPayload(payload);

            const container = document.getElementById('qr-pages');
            container.innerHTML = '';

            pages.forEach((page, index) => {
                const json = JSON.stringify(page);
                const pageDiv = document.createElement('div');
                pageDiv.className = 'qr-page';

                const canvas = document.createElement('canvas');
                pageDiv.appendChild(canvas);

                if (pages.length > 1) {
                    const label = document.createElement('div');
                    label.className = 'qr-page-label';
                    label.textContent = `Page ${index + 1} of ${pages.length}`;
                    pageDiv.appendChild(label);
                }

                container.appendChild(pageDiv);

                QRCode.toCanvas(canvas, json, {
                    width: 200,
                    errorCorrectionLevel: 'M'
                }, (err) => {
                    if (err) console.error('QR generation failed:', err);
                });
            });
        }

        function buildPayload() {
            const payload = {
                type: 'quick_config',
                configVersion: 1,
                exportedAt: new Date().toISOString()
            };

            // Build nested structure using qrPath from registry
            for (const [key, meta] of Object.entries(SettingsRegistry.settings)) {
                const value = SettingsState.get(key);
                if (value === meta.default) continue; // Skip defaults

                const path = meta.qrPath;
                let current = payload;
                for (let i = 0; i < path.length - 1; i++) {
                    if (!current[path[i]]) current[path[i]] = {};
                    current = current[path[i]];
                }
                current[path[path.length - 1]] = value;
            }

            // Add vitals field order
            if (!payload.vitals) payload.vitals = {};
            payload.vitals.fieldOrder = VitalsFieldOrder.getAll();

            // Add medication timers
            const timers = MedicationTimers.getAll().filter(t => t.timerEnabled);
            if (timers.length > 0) {
                payload.timers = timers.map(t => ({
                    name: t.name,
                    timerEnabled: t.timerEnabled,
                    timerDuration: t.timerDuration,
                    timerLabel: t.timerLabel,
                    timerColor: t.timerColor
                }));
            }

            return payload;
        }

        function splitPayload(payload) {
            // Try single page first
            payload.page = 1;
            payload.totalPages = 1;

            const json = JSON.stringify(payload);
            const sizeBytes = new Blob([json]).size;

            // Error correction level M allows ~5,596 bytes
            if (sizeBytes <= 5596) {
                return [payload];
            }

            // Too large - split into 2 pages
            const page1 = { ...payload };
            delete page1.timers;
            page1.totalPages = 2;

            const page2 = {
                type: 'quick_config',
                configVersion: 1,
                page: 2,
                totalPages: 2,
                timers: payload.timers || []
            };

            return [page1, page2];
        }

        // ========== INITIALIZATION ==========
        MedicationTimers.init();
        SettingsState.init();
        ScreenFilter.init();
        ScreenFilter.filterSettings();
        PreviewRenderer.update();
    </script>
    <script src="nav-loader.js"></script>
</body>
</html>
